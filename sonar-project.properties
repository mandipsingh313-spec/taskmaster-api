# SonarQube / SonarCloud Project Configuration
# TaskMaster API — AI-Assisted Development Research Study
# Northumbria University — Keerthana Janagam

sonar.projectKey=taskmaster-api
sonar.projectName=TaskMaster API
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=app
sonar.tests=tests
sonar.language=py

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,instance/**,htmlcov/**

# Quality gate
sonar.qualitygate.wait=true
